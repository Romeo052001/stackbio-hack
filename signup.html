<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – StackBioHack</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: #000;
    }

    .form-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 72px 40px 80px;
    }

    .back-link {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      margin-bottom: 48px;
    }
    .back-link:hover { opacity: 0.5; }

    .form-section h2 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .form-section p.sub {
      font-size: 16px;
      color: #555;
      margin-bottom: 48px;
    }

    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: #555;
    }
    .form-group input {
      width: 100%;
      border: none;
      border-bottom: 2px solid #000;
      padding: 10px 0;
      font-size: 18px;
      font-family: inherit;
      background: transparent;
      color: #000;
      outline: none;
    }
    .form-group input::placeholder { color: #bbb; }
    .form-group input:focus { border-bottom-color: #555; }
    .optional { font-weight: 400; color: #aaa; }

    .submit-btn {
      margin-top: 32px;
      background: #000;
      color: #fff;
      border: none;
      padding: 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
    }
    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { background: #888; cursor: not-allowed; }

    #thank-you-msg { display: none; padding: 40px 0; }
    #thank-you-msg h3 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 20px;
    }
    #thank-you-msg p { font-size: 18px; color: #555; line-height: 1.5; }
    #thank-you-msg .divider { width: 50px; height: 3px; background: #000; margin: 24px 0; }
  </style>
</head>
<body>

  <div class="form-section">
    <a class="back-link" href="/">← Back</a>

    <div style="font-size:13px; font-weight:900; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:32px;">StackBioHack</div>

    <h2>Sign Up Now</h2>
    <p class="sub">Be first to know when StackBioHack goes live.</p>

    <form id="signup-form" action="https://formsubmit.co/ajax/romeo@davidoffmedia.com" method="POST">
      <input type="hidden" name="_subject" value="New StackBio Hack Sign Up" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_cc" value="chipmarsland@me.com" />

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Company <span class="optional">(optional)</span></label>
        <input type="text" name="company" placeholder="Your company" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+1 (555) 000-0000" required />
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Sign Up Now →</button>
    </form>

    <div id="thank-you-msg">
      <h3>You're in.</h3>
      <div class="divider"></div>
      <p>We got your info and we'll be in touch before the site goes live.</p>
      <p style="margin-top:10px;">Your future stack is coming.</p>
    </div>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      try {
        const data = new FormData(this);
        await fetch(this.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
      } catch(err) {}
      this.style.display = 'none';
      document.querySelector('.form-section h2').style.display = 'none';
      document.querySelector('.form-section p.sub').style.display = 'none';
      document.getElementById('thank-you-msg').style.display = 'block';
    });
  </script>

</body>
</html>
