<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackBio Hack</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      border-top: 2px solid #000;
      overflow: hidden;
    }

    /* LEFT COLUMN */
    .left {
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      padding: 60px 60px 60px 60px;
      overflow-y: auto;
    }

    .site-name {
      font-size: clamp(36px, 5vw, 72px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 60px;
    }

    /* FORM */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: #555;
    }
    .form-group input {
      width: 100%;
      border: none;
      border-bottom: 2px solid #000;
      padding: 10px 0;
      font-size: 18px;
      font-family: inherit;
      background: transparent;
      color: #000;
      outline: none;
    }
    .form-group input::placeholder { color: #aaa; }
    .form-group input:focus { border-bottom-color: #555; }
    .optional { font-weight: 400; color: #aaa; }

    .submit-btn {
      margin-top: 32px;
      background: #000;
      color: #fff;
      border: none;
      padding: 18px 40px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
    }
    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { background: #888; cursor: not-allowed; }

    #thank-you-msg { display: none; }
    #thank-you-msg h3 {
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 20px;
    }
    #thank-you-msg p { font-size: 18px; color: #555; line-height: 1.5; }
    #thank-you-msg .divider { width: 50px; height: 3px; background: #000; margin: 24px 0; }

    /* RIGHT COLUMN */
    .right {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 60px 60px 60px 60px;
    }

    .signup-heading {
      font-size: clamp(36px, 5vw, 72px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 15vh;
    }

    .right-bottom { padding-bottom: 20px; }

    .going-live {
      font-size: clamp(28px, 3.5vw, 52px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: clamp(14px, 1.5vw, 20px);
      font-weight: 500;
      color: #444;
      margin-bottom: 48px;
    }

    .brought-by {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .signature {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(40px, 5vw, 72px);
      font-weight: 700;
      line-height: 1;
      color: #000;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .left { padding: 48px 32px; border-right: none; border-bottom: 1px solid #ddd; }
      .right { padding: 48px 32px; }
      .site-name { margin-bottom: 40px; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="site-name">StackBiohack.com</div>

    <form id="signup-form" action="https://formsubmit.co/ajax/romeo@davidoffmedia.com" method="POST">
      <input type="hidden" name="_subject" value="New StackBio Hack Sign Up" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_cc" value="chipmarsland@me.com" />

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Company <span class="optional">(optional)</span></label>
        <input type="text" name="company" placeholder="Your company" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+1 (555) 000-0000" required />
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Sign Up Now →</button>
    </form>

    <div id="thank-you-msg">
      <h3>You're in.</h3>
      <div class="divider"></div>
      <p>We got your info and we'll be in touch before the site goes live.</p>
      <p style="margin-top:10px;">Your future stack is coming.</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="signup-heading">Sign Up Now.</div>

    <div class="right-bottom">
      <div class="going-live">Site going live.</div>
      <div class="tagline">Shop Peps to Stack + Result Track</div>
      <div class="brought-by">Brought to you by:</div>
      <div class="signature">Chip Marsland</div>
    </div>
  </div>

</div>

<script>
  document.getElementById('signup-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';
    try {
      const data = new FormData(this);
      await fetch(this.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
    } catch(err) {}
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('thank-you-msg').style.display = 'block';
  });
</script>

</body>
</html>
